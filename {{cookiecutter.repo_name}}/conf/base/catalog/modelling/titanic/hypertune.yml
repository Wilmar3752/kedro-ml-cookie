titanic_model:
  type: kedro_mlflow.io.artifacts.MlflowArtifactDataset
  dataset:
    type: pickle.PickleDataset
    filepath: data/06_models/titanic_model.pkl
    versioned: true
  artifact_path: "models/titanic"
  metadata:
    layer: 06_models

titanic_study:
  type: kedro_mlflow.io.artifacts.MlflowArtifactDataset
  dataset:
    type: pickle.PickleDataset
    filepath: data/06_models/titanic_study.pkl
    versioned: true
  artifact_path: "models/titanic"
  metadata:
    layer: 06_models

titanic_registered_model:
  type: packages.modelling.models.mlflow.registry.MLflowModelStageManager
  model_name: titanic
  load_stage: Staging
  save_stage: Staging
  pyfunc_predict_fn: predict
  metadata:
    layer: 06_models

titanic_predictions:
  type: pandas.CSVDataset
  filepath: data/07_model_output/titanic_predictions.csv
  metadata:
    layer: 07_model_output

titanic_model_metrics:
  type: json.JSONDataset
  filepath: data/09_tracking/titanic_metrics.json
  metadata:
    layer: 09_tracking
