california_features: &california_features
  columns:
    # Income / economic
    - MedInc
    # Housing characteristics
    - HouseAge
    - AveRooms
    - AveBedrms
    # Density
    - Population
    - AveOccup
    # Geographic
    - Latitude
    - Longitude


california.hypertune:

  target: MedHouseVal

  # Metric used to select the best Optuna trial (r2: higher is better)
  cv_score:
    metric_to_optimize: r2

  # Optuna configuration
  optuna:
    kwargs_study:
      direction: maximize          # r2: higher is better
      study_name: "california_experiment"
      load_if_exists: false

    kwargs_optimize:
      n_trials: ${globals:number_of_trials}
      timeout: 600                 # 10 min max

    sampler:
      class: optuna.samplers.TPESampler
      kwargs:
        n_startup_trials: 10
        multivariate: true
        seed: 42

    pruner:
      class: optuna.pruners.MedianPruner
      kwargs:
        n_startup_trials: 5
        n_warmup_steps: 0

  # Cross-validation strategy (KFold for regression — no stratification needed)
  cv_strategy:
    class: sklearn.model_selection.KFold
    kwargs:
      n_splits: 5
      shuffle: true
      random_state: 42

  # Early stopping via Optuna pruning across folds
  early_stopping:
    enabled: true
    min_folds_before_pruning: 2

  # Feature list (referenced from YAML anchor above)
  features:
    <<: *california_features

  # Sklearn pipeline — order defines execution order
  pipeline:

    # 1. Select only the relevant columns
    columns_selector:
      class: packages.modelling.transformers.columns_selector.ColumnsSelector
      kwargs:
        <<: *california_features

    # 2. Impute missing numerical values with the median (defensively)
    numerical_imputer:
      class: feature_engine.imputation.MeanMedianImputer
      kwargs:
        imputation_method: median
        variables:         # Auto-configured by AutoConfigFeaturePreprocessors

    # 3. LightGBM regressor — hyperparameters explored by Optuna
    model:
      class: lightgbm.LGBMRegressor
      kwargs:
        n_estimators: "trial.suggest_int('n_estimators', 100, 600)"
        max_depth: "trial.suggest_int('max_depth', 3, 8)"
        learning_rate: "trial.suggest_float('learning_rate', 0.01, 0.3, log=True)"
        num_leaves: "trial.suggest_int('num_leaves', 20, 150)"
        min_child_samples: "trial.suggest_int('min_child_samples', 10, 80)"
        subsample: "trial.suggest_float('subsample', 0.6, 1.0)"
        colsample_bytree: "trial.suggest_float('colsample_bytree', 0.6, 1.0)"
        reg_alpha: "trial.suggest_float('reg_alpha', 1e-8, 1.0, log=True)"
        reg_lambda: "trial.suggest_float('reg_lambda', 1e-4, 10.0, log=True)"
        random_state: 42
        verbose: -1
