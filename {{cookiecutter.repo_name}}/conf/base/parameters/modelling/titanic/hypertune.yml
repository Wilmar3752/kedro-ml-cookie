titanic_features: &titanic_features
  columns:
    # Socio-demographic
    - pclass
    - sex
    - age
    - sibsp
    - parch
    # Economic
    - fare
    # Geographic
    - embarked


titanic.hypertune:

  target: survived

  # Decision threshold for converting probabilities to binary labels
  probability_threshold: 0.5

  # Metric used to select the best Optuna trial
  cv_score:
    metric_to_optimize: roc_auc

  # Optuna configuration
  optuna:
    kwargs_study:
      direction: maximize          # roc_auc: higher is better
      study_name: "titanic_experiment"
      load_if_exists: false

    kwargs_optimize:
      n_trials: ${globals:number_of_trials}
      timeout: 600                 # 10 min max

    sampler:
      class: optuna.samplers.TPESampler
      kwargs:
        n_startup_trials: 10
        multivariate: true
        seed: 42

    pruner:
      class: optuna.pruners.MedianPruner
      kwargs:
        n_startup_trials: 5
        n_warmup_steps: 0

  # Cross-validation strategy (StratifiedKFold preserves class balance)
  cv_strategy:
    class: sklearn.model_selection.StratifiedKFold
    kwargs:
      n_splits: 5
      shuffle: true
      random_state: 42

  # Early stopping via Optuna pruning across folds
  early_stopping:
    enabled: true
    min_folds_before_pruning: 2

  # Feature list (referenced from YAML anchor above)
  features:
    <<: *titanic_features

  # Sklearn pipeline — order defines execution order
  pipeline:

    # 1. Select only the relevant columns
    columns_selector:
      class: packages.modelling.transformers.columns_selector.ColumnsSelector
      kwargs:
        <<: *titanic_features

    # 2. Impute missing categorical values with the most frequent category
    categorical_imputer:
      class: feature_engine.imputation.CategoricalImputer
      kwargs:
        imputation_method: frequent
        variables:         # Auto-configured by AutoConfigFeaturePreprocessors

    # 3. Impute missing numerical values with the median
    numerical_imputer:
      class: feature_engine.imputation.MeanMedianImputer
      kwargs:
        imputation_method: median
        variables:         # Auto-configured by AutoConfigFeaturePreprocessors

    # 4. Encode rare categories (< 5% frequency) into a single "Rare" bucket
    rare_label_encoder:
      class: feature_engine.encoding.RareLabelEncoder
      kwargs:
        tol: 0.05
        n_categories: 1
        variables:         # Auto-configured by AutoConfigFeaturePreprocessors

    # 5. Ordinal-encode categorical variables into integers
    ordinal_encoder:
      class: feature_engine.encoding.OrdinalEncoder
      kwargs:
        encoding_method: ordered
        variables:         # Auto-configured by AutoConfigFeaturePreprocessors

    # 6. LightGBM classifier — hyperparameters explored by Optuna
    model:
      class: lightgbm.LGBMClassifier
      kwargs:
        n_estimators: "trial.suggest_int('n_estimators', 50, 500)"
        max_depth: "trial.suggest_int('max_depth', 3, 8)"
        learning_rate: "trial.suggest_float('learning_rate', 0.1, 0.3, log=True)"
        num_leaves: "trial.suggest_int('num_leaves', 10, 40)"
        min_child_samples: "trial.suggest_int('min_child_samples', 60, 100)"
        subsample: "trial.suggest_float('subsample', 0.6, 1.0)"
        colsample_bytree: "trial.suggest_float('colsample_bytree', 0.6, 1.0)"
        reg_alpha: "trial.suggest_float('reg_alpha', 1e-8, 1, log=True)"
        reg_lambda: "trial.suggest_float('reg_lambda', 1e-4, 10.0, log=True)"
        random_state: 42
        verbose: -1
